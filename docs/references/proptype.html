<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>健康随访管家</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
        }
        /* 隐藏滚动条但保留滚动功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 模拟初始数据
        const initialRecords = [
            { id: 1, date: '2023-10-20', time: '08:00', sys: 135, dia: 85, hr: 72, symptoms: ['头晕'], notes: '早上起来有点晕' },
            { id: 2, date: '2023-10-21', time: '07:30', sys: 142, dia: 90, hr: 75, symptoms: [], notes: '' },
            { id: 3, date: '2023-10-22', time: '08:15', sys: 128, dia: 80, hr: 70, symptoms: [], notes: '睡得比较好' },
            { id: 4, date: '2023-10-23', time: '08:00', sys: 130, dia: 82, hr: 71, symptoms: ['乏力'], notes: '' },
            { id: 5, date: '2023-10-24', time: '07:45', sys: 145, dia: 92, hr: 78, symptoms: ['头痛'], notes: '昨晚没睡好' },
            { id: 6, date: '2023-10-25', time: '08:00', sys: 132, dia: 84, hr: 73, symptoms: [], notes: '' },
            { id: 7, date: '2023-10-26', time: '08:30', sys: 125, dia: 78, hr: 68, symptoms: [], notes: '' },
        ];

        const initialMeds = [
            { id: 1, name: '硝苯地平控释片 (拜新同)', dosage: '1片 (30mg)', time: '早晨', taken: false },
            { id: 2, name: '阿托伐他汀钙片', dosage: '1片 (20mg)', time: '睡前', taken: false }
        ];

        const initialMessages = [
            { id: 1, sender: 'doctor', text: '王叔叔，您最近两天的早晨血压控制得不错，继续保持。头晕的症状如果有加重随时跟我说。', time: '昨天 09:30' },
            { id: 2, sender: 'patient', text: '好的李医生，今天早上量了是 125/78，感觉挺好的。', time: '今天 08:35' }
        ];

        const SYMPTOMS_LIST = ['头晕', '恶心', '呕吐', '头痛', '乏力', '心悸', '胸闷'];

        // 辅助函数：判断血压状态
        const getBPStatus = (sys, dia) => {
            if (sys > 140 || dia > 90) return { label: '偏高', color: 'text-red-500', bg: 'bg-red-50', border: 'border-red-200' };
            if (sys < 90 || dia < 60) return { label: '偏低', color: 'text-yellow-600', bg: 'bg-yellow-50', border: 'border-yellow-200' };
            return { label: '正常', color: 'text-green-500', bg: 'bg-green-50', border: 'border-green-200' };
        };

        // 简易 SVG 折线图组件
        const SimpleLineChart = ({ data, dataKey, color, title, optimalMin, optimalMax }) => {
            const width = 300;
            const height = 120;
            const padding = 20;
            
            if (!data || data.length === 0) return <div>无数据</div>;

            const values = data.map(d => d[dataKey]);
            const maxVal = Math.max(...values, optimalMax + 10);
            const minVal = Math.min(...values, optimalMin - 10 > 0 ? optimalMin - 10 : 0);
            
            const getX = (index) => padding + (index * ((width - padding * 2) / (data.length - 1 || 1)));
            const getY = (val) => height - padding - ((val - minVal) / (maxVal - minVal)) * (height - padding * 2);

            const points = data.map((d, i) => `${getX(i)},${getY(d[dataKey])}`).join(' ');

            // 计算正常范围的背景矩形
            const optimalTopY = getY(optimalMax);
            const optimalBottomY = getY(optimalMin);
            const optimalHeight = optimalBottomY - optimalTopY;

            return (
                <div className="bg-white p-4 rounded-2xl shadow-sm mb-4">
                    <h3 className="text-gray-700 font-semibold mb-2 flex items-center">
                        <i className={`fas fa-chart-line mr-2 ${color.text}`}></i> {title}
                    </h3>
                    <div className="relative w-full overflow-x-auto no-scrollbar">
                        <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto min-w-[300px]">
                            {/* 正常范围参考带 */}
                            <rect 
                                x={padding} 
                                y={optimalTopY} 
                                width={width - padding * 2} 
                                height={optimalHeight} 
                                fill="#f0fdf4" 
                                opacity="0.6"
                            />
                            {/* 虚线刻度 */}
                            <line x1={padding} y1={getY(optimalMax)} x2={width-padding} y2={getY(optimalMax)} stroke="#e5e7eb" strokeDasharray="4" />
                            <text x={0} y={getY(optimalMax) + 4} fontSize="10" fill="#9ca3af">{optimalMax}</text>
                            
                            <line x1={padding} y1={getY(optimalMin)} x2={width-padding} y2={getY(optimalMin)} stroke="#e5e7eb" strokeDasharray="4" />
                            <text x={0} y={getY(optimalMin) + 4} fontSize="10" fill="#9ca3af">{optimalMin}</text>

                            {/* 折线 */}
                            <polyline
                                fill="none"
                                stroke={color.stroke}
                                strokeWidth="3"
                                strokeLinecap="round"
                                strokeLinejoin="round"
                                points={points}
                            />
                            {/* 数据点 */}
                            {data.map((d, i) => (
                                <g key={i}>
                                    <circle
                                        cx={getX(i)}
                                        cy={getY(d[dataKey])}
                                        r="4"
                                        fill="white"
                                        stroke={color.stroke}
                                        strokeWidth="2"
                                    />
                                    {/* 仅显示最后两个数据点的值以免拥挤 */}
                                    {i >= data.length - 2 && (
                                        <text x={getX(i)} y={getY(d[dataKey]) - 10} fontSize="10" fill="#4b5563" textAnchor="middle font-bold">
                                            {d[dataKey]}
                                        </text>
                                    )}
                                </g>
                            ))}
                        </svg>
                    </div>
                </div>
            );
        };

        const HomeTab = ({ onSaveRecord, meds, toggleMed, latestDoctorMsg }) => {
            const [sys, setSys] = useState('');
            const [dia, setDia] = useState('');
            const [hr, setHr] = useState('');
            const [spo2, setSpo2] = useState('');
            const [selectedSymptoms, setSelectedSymptoms] = useState([]);
            const [notes, setNotes] = useState('');
            const [showMore, setShowMore] = useState(false);

            const handleToggleSymptom = (sym) => {
                if (selectedSymptoms.includes(sym)) {
                    setSelectedSymptoms(selectedSymptoms.filter(s => s !== sym));
                } else {
                    setSelectedSymptoms([...selectedSymptoms, sym]);
                }
            };

            const handleSubmit = () => {
                if (!sys || !dia) {
                    alert('请填写高压和低压');
                    return;
                }
                const now = new Date();
                const record = {
                    id: Date.now(),
                    date: now.toISOString().split('T')[0],
                    time: now.toTimeString().split(' ')[0].substring(0, 5),
                    sys: parseInt(sys),
                    dia: parseInt(dia),
                    hr: hr ? parseInt(hr) : null,
                    spo2: spo2 ? parseInt(spo2) : null,
                    symptoms: selectedSymptoms,
                    notes: notes
                };
                onSaveRecord(record);
                // 重置表单
                setSys(''); setDia(''); setHr(''); setSpo2('');
                setSelectedSymptoms([]); setNotes(''); setShowMore(false);
                
                // 模拟原生应用的轻微震动反馈（如果支持）
                if (navigator.vibrate) navigator.vibrate(50);
            };

            return (
                <div className="pb-24 pt-4 px-4 space-y-6">
                    {/* 医生留言卡片 - 放在最显眼位置 */}
                    {latestDoctorMsg && (
                        <div className="bg-blue-50 border border-blue-100 p-4 rounded-2xl flex items-start space-x-3">
                            <div className="bg-blue-100 text-blue-600 rounded-full w-10 h-10 flex items-center justify-center shrink-0">
                                <i className="fas fa-user-md text-xl"></i>
                            </div>
                            <div>
                                <h3 className="font-bold text-gray-800 text-sm mb-1">李医生 (家庭医生) 最新反馈</h3>
                                <p className="text-gray-600 text-sm">{latestDoctorMsg.text}</p>
                            </div>
                        </div>
                    )}

                    {/* 快速记录区域 */}
                    <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-xl font-bold text-gray-800">记录当前健康数据</h2>
                            <span className="text-gray-400 text-sm">{new Date().toLocaleDateString()}</span>
                        </div>

                        {/* 血压大号输入 */}
                        <div className="flex justify-between items-end space-x-4 mb-6">
                            <div className="flex-1">
                                <label className="block text-gray-500 text-sm mb-2 font-medium">高压 (收缩压)</label>
                                <div className="relative">
                                    <input 
                                        type="number" 
                                        value={sys}
                                        onChange={(e) => setSys(e.target.value)}
                                        className="w-full text-center text-4xl font-bold bg-gray-50 border-none rounded-2xl py-4 focus:ring-2 focus:ring-blue-400 outline-none"
                                        placeholder="--"
                                    />
                                    <span className="absolute right-4 bottom-4 text-gray-400 text-sm">mmHg</span>
                                </div>
                            </div>
                            <div className="text-3xl text-gray-300 font-light mb-4">/</div>
                            <div className="flex-1">
                                <label className="block text-gray-500 text-sm mb-2 font-medium">低压 (舒张压)</label>
                                <div className="relative">
                                    <input 
                                        type="number" 
                                        value={dia}
                                        onChange={(e) => setDia(e.target.value)}
                                        className="w-full text-center text-4xl font-bold bg-gray-50 border-none rounded-2xl py-4 focus:ring-2 focus:ring-blue-400 outline-none"
                                        placeholder="--"
                                    />
                                    <span className="absolute right-4 bottom-4 text-gray-400 text-sm">mmHg</span>
                                </div>
                            </div>
                        </div>

                        {/* 展开更多选项 */}
                        {!showMore ? (
                            <button 
                                onClick={() => setShowMore(true)}
                                className="w-full text-center text-blue-500 text-sm py-2 rounded-lg hover:bg-blue-50 transition"
                            >
                                <i className="fas fa-chevron-down mr-1"></i> 展开心率、血氧及症状记录
                            </button>
                        ) : (
                            <div className="space-y-5 animate-fade-in">
                                <div className="flex space-x-4">
                                     <div className="flex-1">
                                        <label className="block text-gray-500 text-sm mb-2"><i className="fas fa-heartbeat text-red-400 w-5"></i> 心率</label>
                                        <input type="number" value={hr} onChange={(e) => setHr(e.target.value)} className="w-full text-lg bg-gray-50 border-none rounded-xl py-3 px-4 outline-none focus:ring-2 focus:ring-blue-200" placeholder="次/分" />
                                    </div>
                                    <div className="flex-1">
                                        <label className="block text-gray-500 text-sm mb-2"><i className="fas fa-lungs text-blue-400 w-5"></i> 血氧</label>
                                        <input type="number" value={spo2} onChange={(e) => setSpo2(e.target.value)} className="w-full text-lg bg-gray-50 border-none rounded-xl py-3 px-4 outline-none focus:ring-2 focus:ring-blue-200" placeholder="%" />
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-gray-500 text-sm mb-3">勾选症状 (可多选)</label>
                                    <div className="flex flex-wrap gap-2">
                                        {SYMPTOMS_LIST.map(sym => (
                                            <button
                                                key={sym}
                                                onClick={() => handleToggleSymptom(sym)}
                                                className={`px-4 py-2 rounded-full text-sm transition ${
                                                    selectedSymptoms.includes(sym) 
                                                    ? 'bg-blue-500 text-white shadow-md' 
                                                    : 'bg-gray-100 text-gray-600 border border-gray-200'
                                                }`}
                                            >
                                                {sym}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-gray-500 text-sm mb-2">其他备注</label>
                                    <textarea 
                                        value={notes}
                                        onChange={(e) => setNotes(e.target.value)}
                                        className="w-full bg-gray-50 rounded-xl py-3 px-4 outline-none focus:ring-2 focus:ring-blue-200 resize-none h-20 text-sm"
                                        placeholder="例如：刚吃完饭、感觉特别累..."
                                    ></textarea>
                                </div>
                            </div>
                        )}

                        <button 
                            onClick={handleSubmit}
                            className={`w-full mt-6 py-4 rounded-2xl text-lg font-bold transition shadow-lg ${
                                sys && dia 
                                ? 'bg-gradient-to-r from-blue-500 to-blue-600 text-white shadow-blue-200' 
                                : 'bg-gray-200 text-gray-400 cursor-not-allowed'
                            }`}
                        >
                            <i className="fas fa-check-circle mr-2"></i> 保存记录
                        </button>
                    </div>

                    {/* 用药待办 */}
                    <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                        <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center">
                            <i className="fas fa-pills text-blue-500 mr-2 text-xl"></i> 今日用药
                        </h2>
                        <div className="space-y-3">
                            {meds.map(med => (
                                <div 
                                    key={med.id} 
                                    onClick={() => toggleMed(med.id)}
                                    className={`flex items-center justify-between p-4 rounded-2xl border-2 transition cursor-pointer ${
                                        med.taken ? 'border-green-200 bg-green-50' : 'border-gray-100 bg-white'
                                    }`}
                                >
                                    <div className="flex items-center space-x-4">
                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center border-2 ${
                                            med.taken ? 'bg-green-500 border-green-500 text-white' : 'border-gray-300 text-transparent'
                                        }`}>
                                            <i className="fas fa-check text-sm"></i>
                                        </div>
                                        <div>
                                            <p className={`font-bold ${med.taken ? 'text-gray-500 line-through' : 'text-gray-800'}`}>{med.name}</p>
                                            <p className="text-gray-500 text-sm">{med.time} · {med.dosage}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const TrendsTab = ({ records }) => {
            // 获取最近7条数据用于图表展示
            const chartData = [...records].sort((a, b) => new Date(a.date) - new Date(b.date)).slice(-7);
            
            // 计算统计数据
            const avgSys = Math.round(records.reduce((sum, r) => sum + r.sys, 0) / records.length) || 0;
            const avgDia = Math.round(records.reduce((sum, r) => sum + r.dia, 0) / records.length) || 0;
            const normalCount = records.filter(r => r.sys <= 140 && r.dia <= 90).length;
            const targetRate = records.length > 0 ? Math.round((normalCount / records.length) * 100) : 0;

            return (
                <div className="pb-24 pt-4 px-4 space-y-4">
                    <div className="bg-gradient-to-br from-blue-600 to-blue-800 rounded-3xl p-6 text-white shadow-lg">
                        <h2 className="text-lg font-medium opacity-90 mb-4">近30天血压概览</h2>
                        <div className="flex justify-between items-end mb-6">
                            <div>
                                <p className="text-sm opacity-80 mb-1">平均血压 (mmHg)</p>
                                <div className="text-4xl font-bold">
                                    {avgSys}<span className="text-2xl opacity-70 font-light mx-1">/</span>{avgDia}
                                </div>
                            </div>
                            <div className="text-right">
                                <p className="text-sm opacity-80 mb-1">达标率</p>
                                <div className="text-3xl font-bold text-green-300">{targetRate}%</div>
                            </div>
                        </div>
                        <div className="bg-white/10 rounded-xl p-3 text-sm">
                            <i className="fas fa-info-circle mr-2"></i>
                            {targetRate > 80 ? '控制良好，请继续保持规律服药。' : '近期波动较大，建议联系医生调整用药方案。'}
                        </div>
                    </div>

                    <h2 className="text-lg font-bold text-gray-800 px-2 mt-6">趋势图 (近7次)</h2>
                    <SimpleLineChart 
                        data={chartData} 
                        dataKey="sys" 
                        color={{stroke: '#ef4444', text: 'text-red-500'}} 
                        title="高压 (收缩压)" 
                        optimalMin={90} 
                        optimalMax={140} 
                    />
                    <SimpleLineChart 
                        data={chartData} 
                        dataKey="dia" 
                        color={{stroke: '#3b82f6', text: 'text-blue-500'}} 
                        title="低压 (舒张压)" 
                        optimalMin={60} 
                        optimalMax={90} 
                    />

                    <h2 className="text-lg font-bold text-gray-800 px-2 mt-6 mb-2">历史记录明细</h2>
                    <div className="space-y-3">
                        {[...records].sort((a, b) => new Date(b.date) - new Date(a.date)).map(record => {
                            const status = getBPStatus(record.sys, record.dia);
                            return (
                                <div key={record.id} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center">
                                    <div>
                                        <div className="text-sm text-gray-400 mb-1">{record.date} {record.time}</div>
                                        <div className="flex items-center space-x-2">
                                            <span className="text-2xl font-bold text-gray-800">{record.sys}/{record.dia}</span>
                                            <span className={`text-xs px-2 py-1 rounded-md ${status.bg} ${status.color} border ${status.border}`}>
                                                {status.label}
                                            </span>
                                        </div>
                                        {(record.symptoms.length > 0 || record.notes) && (
                                            <div className="mt-2 text-sm text-gray-600 bg-gray-50 p-2 rounded-lg">
                                                {record.symptoms.length > 0 && <span className="text-red-400 mr-2"><i className="fas fa-exclamation-circle"></i> {record.symptoms.join(', ')}</span>}
                                                {record.notes}
                                            </div>
                                        )}
                                    </div>
                                    {(record.hr || record.spo2) && (
                                        <div className="text-right text-sm text-gray-500 space-y-1">
                                            {record.hr && <div><i className="fas fa-heartbeat text-red-300 w-4"></i> {record.hr}</div>}
                                            {record.spo2 && <div><i className="fas fa-lungs text-blue-300 w-4"></i> {record.spo2}%</div>}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const DoctorTab = ({ messages, onSendMessage }) => {
            const [inputText, setInputText] = useState('');
            const scrollRef = useRef(null);

            useEffect(() => {
                if (scrollRef.current) {
                    scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
                }
            }, [messages]);

            const handleSend = () => {
                if (!inputText.trim()) return;
                onSendMessage({
                    id: Date.now(),
                    sender: 'patient',
                    text: inputText,
                    time: '刚刚'
                });
                setInputText('');
                
                // 模拟医生自动回复
                setTimeout(() => {
                    onSendMessage({
                        id: Date.now() + 1,
                        sender: 'doctor',
                        text: '收到您的反馈，我会关注您的血压数据。如果觉得极度不适请及时就医。',
                        time: '刚刚'
                    });
                }, 1500);
            };

            return (
                <div className="flex flex-col h-screen bg-gray-50 pt-4">
                    {/* 医生名片 */}
                    <div className="bg-white p-4 mx-4 rounded-2xl shadow-sm border border-gray-100 flex items-center space-x-4 mb-2 shrink-0">
                        <img src="https://placehold.co/100x100/3b82f6/white?text=李" alt="Doctor" className="w-14 h-14 rounded-full object-cover" />
                        <div className="flex-1">
                            <h2 className="text-lg font-bold text-gray-800">李建国 医生</h2>
                            <p className="text-sm text-gray-500">社区家庭签约医生 · 心血管科</p>
                        </div>
                        <a href="tel:120" className="w-10 h-10 rounded-full bg-red-50 text-red-500 flex items-center justify-center">
                            <i className="fas fa-phone-alt"></i>
                        </a>
                    </div>

                    {/* 聊天记录 */}
                    <div className="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar pb-32" ref={scrollRef}>
                        <div className="text-center text-xs text-gray-400 my-2">-- 已建立长期随访档案 --</div>
                        {messages.map(msg => (
                            <div key={msg.id} className={`flex ${msg.sender === 'patient' ? 'justify-end' : 'justify-start'}`}>
                                {msg.sender === 'doctor' && (
                                    <div className="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center mr-2 mt-1 shrink-0">李</div>
                                )}
                                <div className={`max-w-[75%] p-3 rounded-2xl text-[15px] ${
                                    msg.sender === 'patient' 
                                    ? 'bg-blue-500 text-white rounded-tr-sm' 
                                    : 'bg-white border border-gray-100 text-gray-800 rounded-tl-sm shadow-sm'
                                }`}>
                                    {msg.text}
                                    <div className={`text-[10px] mt-1 text-right ${msg.sender === 'patient' ? 'text-blue-100' : 'text-gray-400'}`}>
                                        {msg.time}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* 输入区 - 固定在底部上方一点，避开主导航 */}
                    <div className="fixed bottom-16 left-0 w-full bg-white border-t border-gray-100 p-3 max-w-md mx-auto right-0">
                        <div className="flex items-center space-x-2 bg-gray-100 rounded-full p-1 pl-4">
                            <input 
                                type="text" 
                                value={inputText}
                                onChange={(e) => setInputText(e.target.value)}
                                onKeyPress={(e) => e.key === 'Enter' && handleSend()}
                                placeholder="输入您想咨询的问题..."
                                className="flex-1 bg-transparent outline-none text-[15px] py-2"
                            />
                            <button 
                                onClick={handleSend}
                                className={`w-10 h-10 rounded-full flex items-center justify-center transition ${
                                    inputText.trim() ? 'bg-blue-500 text-white' : 'bg-gray-300 text-gray-100'
                                }`}
                            >
                                <i className="fas fa-paper-plane text-sm"></i>
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const ProfileTab = () => {
            return (
                <div className="pb-24 pt-4 px-4 space-y-4">
                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 text-center">
                        <div className="w-20 h-20 bg-blue-100 text-blue-500 rounded-full flex items-center justify-center text-3xl mx-auto mb-3">
                            <i className="fas fa-user"></i>
                        </div>
                        <h2 className="text-xl font-bold text-gray-800">王建国</h2>
                        <p className="text-gray-500 text-sm mt-1">档案号: HB-20230911001</p>
                        <div className="flex justify-center space-x-8 mt-6 pt-6 border-t border-gray-100">
                            <div>
                                <p className="text-gray-400 text-sm">年龄</p>
                                <p className="text-lg font-bold text-gray-800">68岁</p>
                            </div>
                            <div>
                                <p className="text-gray-400 text-sm">身高</p>
                                <p className="text-lg font-bold text-gray-800">172cm</p>
                            </div>
                            <div>
                                <p className="text-gray-400 text-sm">体重</p>
                                <p className="text-lg font-bold text-gray-800">75kg</p>
                            </div>
                        </div>
                    </div>

                    <div className="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                        <div className="p-4 border-b border-gray-50 flex items-center text-gray-700">
                            <i className="fas fa-notes-medical w-6 text-center text-red-400 mr-2"></i>
                            <span className="font-bold">既往病史</span>
                        </div>
                        <div className="p-4 bg-gray-50 text-sm text-gray-600 leading-relaxed">
                            <p>• 原发性高血压 (3级 极高危)</p>
                            <p>• 脑出血术后康复期 (2022年)</p>
                            <p>• 2型糖尿病</p>
                        </div>
                    </div>

                    <div className="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                        <div className="p-4 border-b border-gray-50 flex items-center text-gray-700">
                            <i className="fas fa-pills w-6 text-center text-blue-400 mr-2"></i>
                            <span className="font-bold">当前长效用药维护</span>
                            <i className="fas fa-chevron-right ml-auto text-gray-300 text-sm"></i>
                        </div>
                        <div className="p-4 border-b border-gray-50 flex items-center text-gray-700">
                            <i className="fas fa-mobile-alt w-6 text-center text-purple-400 mr-2"></i>
                            <span className="font-bold">紧急联系人 (家属)</span>
                            <span className="ml-auto text-gray-500 text-sm">已绑定 儿子</span>
                        </div>
                        <div className="p-4 flex items-center text-gray-700">
                            <i className="fas fa-cog w-6 text-center text-gray-400 mr-2"></i>
                            <span className="font-bold">系统设置</span>
                            <i className="fas fa-chevron-right ml-auto text-gray-300 text-sm"></i>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [records, setRecords] = useState(initialRecords);
            const [meds, setMeds] = useState(initialMeds);
            const [messages, setMessages] = useState(initialMessages);

            const handleSaveRecord = (newRecord) => {
                setRecords([...records, newRecord]);
                alert('记录保存成功！辛苦了。');
            };

            const toggleMed = (id) => {
                setMeds(meds.map(m => m.id === id ? { ...m, taken: !m.taken } : m));
            };

            const handleSendMessage = (msg) => {
                setMessages([...messages, msg]);
            };

            const latestDoctorMsg = [...messages].reverse().find(m => m.sender === 'doctor');

            const navItems = [
                { id: 'home', icon: 'fa-home', label: '首页' },
                { id: 'trends', icon: 'fa-chart-area', label: '趋势' },
                { id: 'doctor', icon: 'fa-user-md', label: '医生' },
                { id: 'profile', icon: 'fa-user', label: '我的' }
            ];

            return (
                <div className="max-w-md mx-auto bg-gray-50 min-h-screen relative shadow-2xl overflow-hidden flex flex-col">
                    
                    {/* 顶部状态栏占位 (模拟App) */}
                    <div className="h-6 bg-transparent"></div>

                    {/* 主要内容区 */}
                    <div className="flex-1 overflow-y-auto no-scrollbar">
                        {activeTab === 'home' && <HomeTab onSaveRecord={handleSaveRecord} meds={meds} toggleMed={toggleMed} latestDoctorMsg={latestDoctorMsg} />}
                        {activeTab === 'trends' && <TrendsTab records={records} />}
                        {activeTab === 'doctor' && <DoctorTab messages={messages} onSendMessage={handleSendMessage} />}
                        {activeTab === 'profile' && <ProfileTab />}
                    </div>

                    {/* 底部导航栏 */}
                    <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/90 backdrop-blur-md border-t border-gray-200 flex justify-around items-center pb-safe pt-2 px-2 pb-6 z-50">
                        {navItems.map(item => (
                            <button
                                key={item.id}
                                onClick={() => setActiveTab(item.id)}
                                className={`flex flex-col items-center p-2 transition-colors w-16 ${
                                    activeTab === item.id ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600'
                                }`}
                            >
                                <i className={`fas ${item.icon} text-xl mb-1 ${activeTab === item.id ? 'transform scale-110 transition-transform' : ''}`}></i>
                                <span className="text-[10px] font-medium">{item.label}</span>
                            </button>
                        ))}
                    </div>

                    {/* 全局安全区样式适配iOS底部横条 */}
                    <style dangerouslySetInnerHTML={{__html: `
                        @supports (padding-bottom: env(safe-area-inset-bottom)) {
                            .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
                        }
                    `}} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
